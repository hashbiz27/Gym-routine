<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Glossary</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0e17; --surface: #111827; --surface2: #1a2236;
    --border: #1e2d47; --accent: #00d4ff; --accent2: #7c3aed;
    --accent3: #10b981; --warn: #f59e0b; --text: #e2e8f0;
    --muted: #64748b; --code-bg: #0d1117; --highlight: #0d2a1c;
  }
  body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 40px 24px; position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 48px; }
  .logo-line {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    font-size: 11px; font-family: 'JetBrains Mono', monospace; font-weight: 600;
    letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px;
  }
  h1 { font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 800; line-height: 1.05; letter-spacing: -2px; color: var(--text); margin-bottom: 12px; }
  h1 span { background: linear-gradient(135deg, var(--accent), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .subtitle { color: var(--muted); font-size: 15px; font-weight: 400; font-family: 'JetBrains Mono', monospace; }
  .controls { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 32px; align-items: center; }
  .search-wrap { flex: 1; min-width: 240px; position: relative; }
  .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  input[type="search"] {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 14px;
    padding: 12px 14px 12px 42px; outline: none; transition: border-color .2s, box-shadow .2s;
  }
  input[type="search"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,.1); }
  input[type="search"]::placeholder { color: var(--muted); }
  .filters { display: flex; flex-wrap: wrap; gap: 8px; }
  .filter-btn {
    padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted); font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; letter-spacing: .5px;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .stats-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding: 0 4px; }
  .count-label { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); }
  .count-label strong { color: var(--accent); }
  .category-section { margin-bottom: 40px; }
  .category-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .category-header h2 { font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .category-header .cat-count { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); background: var(--surface2); padding: 2px 8px; border-radius: 20px; }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px; cursor: pointer; transition: border-color .2s, transform .15s, box-shadow .2s;
    position: relative;
  }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; border-radius: 12px 12px 0 0; opacity: 0; transition: opacity .2s; background: linear-gradient(90deg, var(--accent2), var(--accent)); }
  .card:hover { border-color: rgba(0,212,255,.3); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,.3); }
  .card:hover::before { opacity: 1; }
  .card.open { transform: none; }
  .card.open::before { opacity: 1; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
  .card-name { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
  .badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; letter-spacing: .5px; }
  .card-desc { font-size: 13px; color: var(--muted); line-height: 1.55; font-family: 'JetBrains Mono', monospace; font-weight: 300; margin-bottom: 12px; }
  .card-syntax { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .card-syntax .kw { color: var(--accent2); font-weight: 600; }
  .card-syntax .fn { color: var(--accent); }
  .card-syntax .str { color: var(--accent3); }
  .card-syntax .cm { color: var(--muted); font-style: italic; }
  .card-extra { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .card.open .card-extra { display: block; }
  .example-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .tables-wrap { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; overflow-x: auto; padding-bottom: 4px; }
  .arrow-sep { display: flex; align-items: center; padding-top: 26px; color: var(--accent); font-size: 16px; flex-shrink: 0; }
  .tbl-block { flex: 1; min-width: 100px; }
  .tbl-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
  .tbl { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .tbl th { background: var(--surface2); color: var(--accent2); padding: 5px 8px; text-align: left; font-weight: 600; border: 1px solid var(--border); white-space: nowrap; }
  .tbl td { padding: 4px 8px; border: 1px solid var(--border); color: var(--text); white-space: nowrap; }
  .tbl tr.hl td { background: var(--highlight); color: var(--accent3); }
  .tbl tr:nth-child(even) td { background: rgba(255,255,255,.02); }
  .no-results { text-align: center; padding: 60px 20px; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 14px; display: none; }
  .no-results.show { display: block; }
  ::-webkit-scrollbar { width: 6px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  @media (max-width: 600px) { .cards-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-line">⬡ Reference v2.0</div>
    <h1>SQL <span>Glossary</span></h1>
    <p class="subtitle">// Complete syntax reference · click any card to see a live table example</p>
  </header>
  <div class="controls">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="search" id="search" placeholder="Search functions, keywords..." autocomplete="off">
    </div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-cat="all">All</button>
    </div>
  </div>
  <div class="stats-bar">
    <span class="count-label">Showing <strong id="visible-count">0</strong> of <strong id="total-count">0</strong> entries</span>
  </div>
  <div id="glossary"></div>
  <div class="no-results" id="no-results">No results found for your search.</div>
</div>
<script>
const CATEGORIES = {
  "DML":{"color":"#00d4ff","label":"DML — Data Manipulation"},
  "DDL":{"color":"#7c3aed","label":"DDL — Data Definition"},
  "DCL":{"color":"#f59e0b","label":"DCL — Data Control"},
  "JOINS":{"color":"#10b981","label":"Joins"},
  "AGGREGATE":{"color":"#ec4899","label":"Aggregate Functions"},
  "STRING":{"color":"#3b82f6","label":"String Functions"},
  "DATE":{"color":"#f97316","label":"Date & Time Functions"},
  "NUMERIC":{"color":"#84cc16","label":"Numeric Functions"},
  "CONVERSION":{"color":"#06b6d4","label":"Conversion & Casting"},
  "WINDOW":{"color":"#8b5cf6","label":"Window Functions"},
  "CONDITIONAL":{"color":"#ef4444","label":"Conditional & Logical"},
  "SUBQUERY":{"color":"#14b8a6","label":"Subqueries & CTEs"},
  "NULL":{"color":"#a855f7","label":"NULL Handling"},
  "SET":{"color":"#f59e0b","label":"Set Operations"},
  "ANALYTIC":{"color":"#0ea5e9","label":"Analytic / Ranking"},
  "MISC":{"color":"#94a3b8","label":"Misc & Advanced"},
};

function tbl(headers, rows, hl=[]) {
  const ths = headers.map(h=>`<th>${h}</th>`).join('');
  const trs = rows.map((r,i)=>`<tr${hl.includes(i)?' class="hl"':''}>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');
  return `<table class="tbl"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
}
function ex(blocks) {
  let h='<div class="example-label">▶ example</div><div class="tables-wrap">';
  blocks.forEach((b,i)=>{
    if(i>0)h+='<div class="arrow-sep">→</div>';
    h+=`<div class="tbl-block"><div class="tbl-title">${b.t}</div>${b.html}</div>`;
  });
  return h+'</div>';
}

const DATA=[
{cat:"DML",name:"SELECT",desc:"Retrieves rows from one or more tables.",
syntax:`<span class="kw">SELECT</span> name, salary <span class="kw">FROM</span> employees\n<span class="kw">WHERE</span> dept = <span class="str">'Engineering'</span>\n<span class="kw">ORDER BY</span> salary <span class="kw">DESC</span>;`,
example:ex([
  {t:"employees",html:tbl(['id','name','dept','salary'],[['1','Alice','Engineering','95000'],['2','Bob','Marketing','72000'],['3','Carol','Engineering','110000'],['4','Dan','Marketing','68000']])},
  {t:"result",html:tbl(['name','salary'],[['Carol','110000'],['Alice','95000']],[0,1])}
])},

{cat:"DML",name:"INSERT INTO",desc:"Inserts new rows into a table.",
syntax:`<span class="kw">INSERT INTO</span> employees (name, dept, salary)\n<span class="kw">VALUES</span> (<span class="str">'Eve'</span>, <span class="str">'Engineering'</span>, 88000);`,
example:ex([
  {t:"before",html:tbl(['id','name','dept','salary'],[['1','Alice','Eng','95000'],['2','Bob','Mkt','72000']])},
  {t:"after INSERT",html:tbl(['id','name','dept','salary'],[['1','Alice','Eng','95000'],['2','Bob','Mkt','72000'],['3','Eve','Eng','88000']],[2])}
])},

{cat:"DML",name:"UPDATE",desc:"Modifies existing rows in a table.",
syntax:`<span class="kw">UPDATE</span> employees\n<span class="kw">SET</span> salary = 80000\n<span class="kw">WHERE</span> name = <span class="str">'Bob'</span>;`,
example:ex([
  {t:"before",html:tbl(['id','name','salary'],[['1','Alice','95000'],['2','Bob','72000'],['3','Carol','110000']])},
  {t:"after UPDATE",html:tbl(['id','name','salary'],[['1','Alice','95000'],['2','Bob','80000'],['3','Carol','110000']],[1])}
])},

{cat:"DML",name:"DELETE",desc:"Removes rows matching a condition from a table.",
syntax:`<span class="kw">DELETE FROM</span> employees\n<span class="kw">WHERE</span> dept = <span class="str">'Marketing'</span>;`,
example:ex([
  {t:"before",html:tbl(['id','name','dept'],[['1','Alice','Engineering'],['2','Bob','Marketing'],['3','Carol','Engineering'],['4','Dan','Marketing']])},
  {t:"after DELETE",html:tbl(['id','name','dept'],[['1','Alice','Engineering'],['3','Carol','Engineering']],[0,1])}
])},

{cat:"DML",name:"MERGE",desc:"Upsert — inserts or updates rows based on a matching condition.",
syntax:`<span class="kw">MERGE INTO</span> target t <span class="kw">USING</span> source s <span class="kw">ON</span> t.id=s.id\n<span class="kw">WHEN MATCHED THEN UPDATE SET</span> t.salary=s.salary\n<span class="kw">WHEN NOT MATCHED THEN INSERT</span> (id,name,salary)\n<span class="kw">VALUES</span> (s.id,s.name,s.salary);`,
example:ex([
  {t:"target (before)",html:tbl(['id','name','salary'],[['1','Alice','90000'],['2','Bob','72000']])},
  {t:"source",html:tbl(['id','name','salary'],[['2','Bob','80000'],['3','Eve','88000']])},
  {t:"target (after)",html:tbl(['id','name','salary'],[['1','Alice','90000'],['2','Bob','80000'],['3','Eve','88000']],[1,2])}
])},

{cat:"DML",name:"TRUNCATE",desc:"Removes all rows from a table instantly without logging individual deletes.",
syntax:`<span class="kw">TRUNCATE TABLE</span> logs;`,
example:ex([
  {t:"before",html:tbl(['id','event'],[['1','login'],['2','click'],['3','logout']])},
  {t:"after TRUNCATE",html:tbl(['id','event'],[['(empty)','—']])}
])},

{cat:"DDL",name:"CREATE TABLE",desc:"Creates a new table with defined columns and constraints.",
syntax:`<span class="kw">CREATE TABLE</span> employees (\n  id     <span class="kw">INT PRIMARY KEY</span>,\n  name   <span class="kw">VARCHAR</span>(100) <span class="kw">NOT NULL</span>,\n  salary <span class="kw">DECIMAL</span>(10,2)\n);`,
example:ex([
  {t:"new table: employees",html:tbl(['id (PK)','name','salary'],[['—','—','—']])}
])},

{cat:"DDL",name:"ALTER TABLE",desc:"Modifies an existing table's structure (add/drop/modify columns).",
syntax:`<span class="kw">ALTER TABLE</span> employees <span class="kw">ADD</span> dept <span class="kw">VARCHAR</span>(50);\n<span class="kw">ALTER TABLE</span> employees <span class="kw">DROP COLUMN</span> old_col;`,
example:ex([
  {t:"before",html:tbl(['id','name','salary'],[['1','Alice','95000']])},
  {t:"after ADD dept",html:tbl(['id','name','salary','dept'],[['1','Alice','95000','NULL']],[0])}
])},

{cat:"DDL",name:"DROP TABLE",desc:"Permanently removes a table and all its data.",
syntax:`<span class="kw">DROP TABLE IF EXISTS</span> temp_data;`,
example:ex([
  {t:"before",html:tbl(['id','val'],[['1','foo'],['2','bar']])},
  {t:"after DROP",html:tbl(['—'],[['Table no longer exists']])}
])},

{cat:"DDL",name:"CREATE INDEX",desc:"Creates an index to speed up query lookups on a column.",
syntax:`<span class="kw">CREATE INDEX</span> idx_emp_dept\n  <span class="kw">ON</span> employees (dept);`,
example:ex([
  {t:"employees",html:tbl(['id','name','dept'],[['1','Alice','Engineering'],['2','Bob','Marketing'],['3','Carol','Engineering']])},
  {t:"idx_emp_dept",html:tbl(['dept','row pointers'],[['Engineering','1, 3'],['Marketing','2']])}
])},

{cat:"DDL",name:"CREATE VIEW",desc:"Defines a virtual table based on a SELECT query.",
syntax:`<span class="kw">CREATE VIEW</span> eng_staff <span class="kw">AS</span>\n  <span class="kw">SELECT</span> name, salary <span class="kw">FROM</span> employees\n  <span class="kw">WHERE</span> dept = <span class="str">'Engineering'</span>;`,
example:ex([
  {t:"employees",html:tbl(['name','dept','salary'],[['Alice','Engineering','95000'],['Bob','Marketing','72000'],['Carol','Engineering','110000']])},
  {t:"view: eng_staff",html:tbl(['name','salary'],[['Alice','95000'],['Carol','110000']],[0,1])}
])},

{cat:"DDL",name:"CREATE SEQUENCE",desc:"Creates an auto-incrementing number generator (Oracle / PostgreSQL).",
syntax:`<span class="kw">CREATE SEQUENCE</span> emp_seq\n  <span class="kw">START WITH</span> 1 <span class="kw">INCREMENT BY</span> 1;`,
example:ex([
  {t:"NEXTVAL() calls",html:tbl(['call','returns'],[['NEXTVAL(emp_seq)','1'],['NEXTVAL(emp_seq)','2'],['NEXTVAL(emp_seq)','3']])}
])},

{cat:"DCL",name:"GRANT",desc:"Grants privileges to a user or role.",
syntax:`<span class="kw">GRANT SELECT</span>, <span class="kw">INSERT ON</span> employees <span class="kw">TO</span> analyst_user;`,
example:ex([
  {t:"before",html:tbl(['user','privilege'],[['analyst_user','(none)']])},
  {t:"after GRANT",html:tbl(['user','privilege'],[['analyst_user','SELECT, INSERT']],[0])}
])},

{cat:"DCL",name:"REVOKE",desc:"Removes previously granted privileges from a user.",
syntax:`<span class="kw">REVOKE INSERT ON</span> employees <span class="kw">FROM</span> analyst_user;`,
example:ex([
  {t:"before",html:tbl(['user','privilege'],[['analyst_user','SELECT, INSERT']])},
  {t:"after REVOKE",html:tbl(['user','privilege'],[['analyst_user','SELECT']],[0])}
])},

{cat:"DCL",name:"COMMIT",desc:"Saves the current transaction to the database permanently.",
syntax:`<span class="kw">BEGIN</span>;\n  <span class="kw">UPDATE</span> accounts <span class="kw">SET</span> balance=balance-500 <span class="kw">WHERE</span> id=1;\n  <span class="kw">UPDATE</span> accounts <span class="kw">SET</span> balance=balance+500 <span class="kw">WHERE</span> id=2;\n<span class="kw">COMMIT</span>;`,
example:ex([
  {t:"accounts (final after COMMIT)",html:tbl(['id','balance'],[['1','4500'],['2','5500']],[0,1])}
])},

{cat:"DCL",name:"ROLLBACK",desc:"Undoes all changes made in the current transaction.",
syntax:`<span class="kw">BEGIN</span>;\n  <span class="kw">DELETE FROM</span> orders <span class="kw">WHERE</span> id=99;\n<span class="kw">ROLLBACK</span>;`,
example:ex([
  {t:"orders (unchanged — rollback reverted delete)",html:tbl(['id','item'],[['98','Widget'],['99','Gadget'],['100','Gizmo']],[1])}
])},

{cat:"DCL",name:"SAVEPOINT",desc:"Sets a named point in a transaction you can roll back to.",
syntax:`<span class="kw">SAVEPOINT</span> sp1;\n<span class="cm">-- work...</span>\n<span class="kw">ROLLBACK TO SAVEPOINT</span> sp1;`,
example:ex([
  {t:"transaction flow",html:tbl(['step','action'],[['1','BEGIN'],['2','INSERT row A'],['3','SAVEPOINT sp1'],['4','INSERT row B'],['5','ROLLBACK TO sp1 → row B gone'],['6','COMMIT → row A saved']])}
])},

{cat:"JOINS",name:"INNER JOIN",desc:"Returns only rows where there is a match in both tables.",
syntax:`<span class="kw">SELECT</span> e.name, d.dept_name\n<span class="kw">FROM</span> employees e\n<span class="kw">INNER JOIN</span> departments d <span class="kw">ON</span> e.dept_id=d.id;`,
example:ex([
  {t:"employees",html:tbl(['id','name','dept_id'],[['1','Alice','10'],['2','Bob','20'],['3','Carol','99']])},
  {t:"departments",html:tbl(['id','dept_name'],[['10','Engineering'],['20','Marketing']])},
  {t:"result (matched only)",html:tbl(['name','dept_name'],[['Alice','Engineering'],['Bob','Marketing']],[0,1])}
])},

{cat:"JOINS",name:"LEFT JOIN",desc:"Returns all rows from the left table; NULLs where no right match.",
syntax:`<span class="kw">SELECT</span> e.name, d.dept_name\n<span class="kw">FROM</span> employees e\n<span class="kw">LEFT JOIN</span> departments d <span class="kw">ON</span> e.dept_id=d.id;`,
example:ex([
  {t:"employees",html:tbl(['name','dept_id'],[['Alice','10'],['Bob','20'],['Carol','99']])},
  {t:"departments",html:tbl(['id','dept_name'],[['10','Engineering'],['20','Marketing']])},
  {t:"result (all left rows)",html:tbl(['name','dept_name'],[['Alice','Engineering'],['Bob','Marketing'],['Carol','NULL']],[0,1,2])}
])},

{cat:"JOINS",name:"RIGHT JOIN",desc:"Returns all rows from the right table; NULLs where no left match.",
syntax:`<span class="kw">SELECT</span> e.name, d.dept_name\n<span class="kw">FROM</span> employees e\n<span class="kw">RIGHT JOIN</span> departments d <span class="kw">ON</span> e.dept_id=d.id;`,
example:ex([
  {t:"employees",html:tbl(['name','dept_id'],[['Alice','10'],['Bob','20']])},
  {t:"departments",html:tbl(['id','dept_name'],[['10','Engineering'],['20','Marketing'],['30','Finance']])},
  {t:"result (all right rows)",html:tbl(['name','dept_name'],[['Alice','Engineering'],['Bob','Marketing'],['NULL','Finance']],[0,1,2])}
])},

{cat:"JOINS",name:"FULL OUTER JOIN",desc:"Returns all rows from both tables, NULLs where no match exists.",
syntax:`<span class="kw">SELECT</span> e.name, d.dept_name\n<span class="kw">FROM</span> employees e\n<span class="kw">FULL OUTER JOIN</span> departments d <span class="kw">ON</span> e.dept_id=d.id;`,
example:ex([
  {t:"employees",html:tbl(['name','dept_id'],[['Alice','10'],['Carol','99']])},
  {t:"departments",html:tbl(['id','dept_name'],[['10','Engineering'],['30','Finance']])},
  {t:"result",html:tbl(['name','dept_name'],[['Alice','Engineering'],['Carol','NULL'],['NULL','Finance']],[0,1,2])}
])},

{cat:"JOINS",name:"CROSS JOIN",desc:"Returns every combination of rows from both tables (Cartesian product).",
syntax:`<span class="kw">SELECT</span> * <span class="kw">FROM</span> colours <span class="kw">CROSS JOIN</span> sizes;`,
example:ex([
  {t:"colours",html:tbl(['colour'],[['Red'],['Blue']])},
  {t:"sizes",html:tbl(['size'],[['S'],['L']])},
  {t:"result (4 rows)",html:tbl(['colour','size'],[['Red','S'],['Red','L'],['Blue','S'],['Blue','L']],[0,1,2,3])}
])},

{cat:"JOINS",name:"SELF JOIN",desc:"Joins a table to itself using aliases — useful for hierarchical data.",
syntax:`<span class="kw">SELECT</span> e.name, m.name <span class="kw">AS</span> manager\n<span class="kw">FROM</span> employees e\n<span class="kw">JOIN</span> employees m <span class="kw">ON</span> e.manager_id=m.id;`,
example:ex([
  {t:"employees",html:tbl(['id','name','manager_id'],[['1','Alice','NULL'],['2','Bob','1'],['3','Carol','1']])},
  {t:"result",html:tbl(['name','manager'],[['Bob','Alice'],['Carol','Alice']],[0,1])}
])},

{cat:"AGGREGATE",name:"COUNT()",desc:"Counts rows or non-NULL values in a column.",
syntax:`<span class="fn">COUNT</span>(*)\n<span class="fn">COUNT</span>(DISTINCT dept)`,
example:ex([
  {t:"employees",html:tbl(['name','dept'],[['Alice','Engineering'],['Bob','Marketing'],['Carol','Engineering'],['Dan','NULL']])},
  {t:"COUNT(*)",html:tbl(['count'],[['4']])},
  {t:"COUNT(DISTINCT dept)",html:tbl(['count'],[['2']])}
])},

{cat:"AGGREGATE",name:"SUM()",desc:"Returns the total sum of a numeric column.",
syntax:`<span class="kw">SELECT</span> dept, <span class="fn">SUM</span>(salary) <span class="kw">FROM</span> employees <span class="kw">GROUP BY</span> dept;`,
example:ex([
  {t:"employees",html:tbl(['name','dept','salary'],[['Alice','Eng','95000'],['Carol','Eng','110000'],['Bob','Mkt','72000']])},
  {t:"result",html:tbl(['dept','SUM(salary)'],[['Eng','205000'],['Mkt','72000']],[0,1])}
])},

{cat:"AGGREGATE",name:"AVG()",desc:"Returns the average (mean) of a numeric column.",
syntax:`<span class="kw">SELECT</span> dept, <span class="fn">AVG</span>(salary) <span class="kw">FROM</span> employees <span class="kw">GROUP BY</span> dept;`,
example:ex([
  {t:"employees",html:tbl(['dept','salary'],[['Eng','95000'],['Eng','105000'],['Mkt','72000']])},
  {t:"result",html:tbl(['dept','AVG(salary)'],[['Eng','100000'],['Mkt','72000']],[0,1])}
])},

{cat:"AGGREGATE",name:"MIN()",desc:"Returns the minimum value in a column.",
syntax:`<span class="kw">SELECT</span> <span class="fn">MIN</span>(salary) <span class="kw">FROM</span> employees;`,
example:ex([
  {t:"employees",html:tbl(['name','salary'],[['Alice','95000'],['Bob','72000'],['Carol','110000']])},
  {t:"MIN(salary)",html:tbl(['min'],[['72000']],[0])}
])},

{cat:"AGGREGATE",name:"MAX()",desc:"Returns the maximum value in a column.",
syntax:`<span class="kw">SELECT</span> <span class="fn">MAX</span>(salary) <span class="kw">FROM</span> employees;`,
example:ex([
  {t:"employees",html:tbl(['name','salary'],[['Alice','95000'],['Bob','72000'],['Carol','110000']])},
  {t:"MAX(salary)",html:tbl(['max'],[['110000']],[0])}
])},

{cat:"AGGREGATE",name:"LISTAGG()",desc:"Aggregates values into a delimited string (Oracle / Snowflake).",
syntax:`<span class="fn">LISTAGG</span>(name, <span class="str">', '</span>) <span class="kw">WITHIN GROUP</span> (<span class="kw">ORDER BY</span> name)`,
example:ex([
  {t:"employees (Eng)",html:tbl(['name','dept'],[['Alice','Eng'],['Carol','Eng'],['Eve','Eng']])},
  {t:"result",html:tbl(['team'],[['Alice, Carol, Eve']],[0])}
])},

{cat:"AGGREGATE",name:"STRING_AGG()",desc:"Aggregates strings with a separator (SQL Server / PostgreSQL).",
syntax:`<span class="fn">STRING_AGG</span>(name, <span class="str">', '</span>) <span class="kw">WITHIN GROUP</span> (<span class="kw">ORDER BY</span> name)`,
example:ex([
  {t:"tags",html:tbl(['product','tag'],[['A','red'],['A','big'],['A','sale']])},
  {t:"result",html:tbl(['product','tags'],[['A','big, red, sale']],[0])}
])},

{cat:"AGGREGATE",name:"GROUP_CONCAT()",desc:"Concatenates values within a group with a separator (MySQL).",
syntax:`<span class="fn">GROUP_CONCAT</span>(name <span class="kw">ORDER BY</span> name <span class="kw">SEPARATOR</span> <span class="str">'|'</span>)`,
example:ex([
  {t:"orders",html:tbl(['customer','item'],[['Ann','Apple'],['Ann','Banana'],['Bob','Cherry']])},
  {t:"result",html:tbl(['customer','items'],[['Ann','Apple|Banana'],['Bob','Cherry']],[0,1])}
])},

{cat:"AGGREGATE",name:"GROUP BY",desc:"Groups rows sharing the same value for aggregation.",
syntax:`<span class="kw">SELECT</span> dept, <span class="fn">COUNT</span>(*) <span class="kw">FROM</span> employees <span class="kw">GROUP BY</span> dept;`,
example:ex([
  {t:"employees",html:tbl(['name','dept'],[['Alice','Eng'],['Carol','Eng'],['Bob','Mkt'],['Dan','Mkt'],['Eve','Mkt']])},
  {t:"result",html:tbl(['dept','COUNT(*)'],[['Eng','2'],['Mkt','3']],[0,1])}
])},

{cat:"AGGREGATE",name:"HAVING",desc:"Filters groups after aggregation — like WHERE but for aggregated values.",
syntax:`<span class="kw">SELECT</span> dept, <span class="fn">COUNT</span>(*) <span class="kw">FROM</span> employees\n<span class="kw">GROUP BY</span> dept <span class="kw">HAVING COUNT</span>(*) > 2;`,
example:ex([
  {t:"grouped counts",html:tbl(['dept','COUNT(*)'],[['Eng','2'],['Mkt','3'],['HR','1']])},
  {t:"HAVING COUNT > 2",html:tbl(['dept','COUNT(*)'],[['Mkt','3']],[0])}
])},

{cat:"AGGREGATE",name:"ROLLUP",desc:"Generates subtotals and grand total alongside normal GROUP BY results.",
syntax:`<span class="kw">GROUP BY ROLLUP</span>(region, dept)`,
example:ex([
  {t:"sales",html:tbl(['region','dept','sales'],[['AU','Eng','100'],['AU','Mkt','80'],['US','Eng','120']])},
  {t:"result (subtotals in green)",html:tbl(['region','dept','SUM'],[['AU','Eng','100'],['AU','Mkt','80'],['AU','NULL','180'],['US','Eng','120'],['US','NULL','120'],['NULL','NULL','300']],[2,4,5])}
])},

{cat:"AGGREGATE",name:"CUBE",desc:"Generates all possible subtotal combinations for given GROUP BY dimensions.",
syntax:`<span class="kw">GROUP BY CUBE</span>(region, dept)`,
example:ex([
  {t:"grouping sets produced by CUBE",html:tbl(['grouping set'],[['(region, dept)'],['(region)'],['(dept)'],['() — grand total']])}
])},

{cat:"AGGREGATE",name:"GROUPING SETS",desc:"Explicitly defines which grouping combinations to produce.",
syntax:`<span class="kw">GROUP BY GROUPING SETS</span>((region,dept),(region),())`,
example:ex([
  {t:"sales",html:tbl(['region','dept','sales'],[['AU','Eng','100'],['AU','Mkt','80']])},
  {t:"result",html:tbl(['region','dept','SUM'],[['AU','Eng','100'],['AU','Mkt','80'],['AU','NULL','180'],['NULL','NULL','180']],[2,3])}
])},

{cat:"STRING",name:"CONCAT()",desc:"Concatenates two or more strings together.",
syntax:`<span class="fn">CONCAT</span>(first_name, <span class="str">' '</span>, last_name)`,
example:ex([
  {t:"people",html:tbl(['first_name','last_name'],[['Alice','Smith'],['Bob','Jones']])},
  {t:"full_name",html:tbl(['full_name'],[['Alice Smith'],['Bob Jones']],[0,1])}
])},

{cat:"STRING",name:"CONCAT_WS()",desc:"Concatenates with a separator, automatically skipping NULL values.",
syntax:`<span class="fn">CONCAT_WS</span>(<span class="str">', '</span>, city, state, zip)`,
example:ex([
  {t:"addresses",html:tbl(['city','state','zip'],[['Sydney','NSW','2000'],['Darwin','NULL','0800']])},
  {t:"result",html:tbl(['address'],[['Sydney, NSW, 2000'],['Darwin, 0800']],[0,1])}
])},

{cat:"STRING",name:"LENGTH() / LEN()",desc:"Returns the number of characters in a string.",
syntax:`<span class="fn">LENGTH</span>(name)  <span class="cm">-- MySQL/Oracle\n</span><span class="fn">LEN</span>(name)     <span class="cm">-- SQL Server</span>`,
example:ex([
  {t:"names",html:tbl(['name'],[['Alice'],['Bob'],['Charlotte']])},
  {t:"length",html:tbl(['name','len'],[['Alice','5'],['Bob','3'],['Charlotte','9']],[0,1,2])}
])},

{cat:"STRING",name:"UPPER() / LOWER()",desc:"Converts a string to all uppercase or all lowercase.",
syntax:`<span class="fn">UPPER</span>(name)\n<span class="fn">LOWER</span>(email)`,
example:ex([
  {t:"input",html:tbl(['name'],[['alice smith'],['BOB JONES']])},
  {t:"UPPER",html:tbl(['upper'],[['ALICE SMITH'],['BOB JONES']],[0,1])}
])},

{cat:"STRING",name:"TRIM()",desc:"Removes leading and trailing whitespace or specified characters.",
syntax:`<span class="fn">TRIM</span>(name)\n<span class="fn">LTRIM</span>(name) / <span class="fn">RTRIM</span>(name)`,
example:ex([
  {t:"raw values",html:tbl(['raw'],[['  Alice  '],['  Bob']])},
  {t:"TRIM result",html:tbl(['trimmed'],[['Alice'],['Bob']],[0,1])}
])},

{cat:"STRING",name:"SUBSTR() / SUBSTRING()",desc:"Extracts a portion of a string starting at a given position.",
syntax:`<span class="fn">SUBSTR</span>(col, 1, 2)\n<span class="fn">SUBSTRING</span>(col <span class="kw">FROM</span> 1 <span class="kw">FOR</span> 2)`,
example:ex([
  {t:"codes",html:tbl(['code'],[['AU-2024-001'],['US-2023-042']])},
  {t:"SUBSTR(code,1,2)",html:tbl(['country'],[['AU'],['US']],[0,1])}
])},

{cat:"STRING",name:"INSTR() / CHARINDEX()",desc:"Returns the position of a substring within a string (1-based).",
syntax:`<span class="fn">INSTR</span>(email, <span class="str">'@'</span>)      <span class="cm">-- Oracle\n</span><span class="fn">CHARINDEX</span>(<span class="str">'@'</span>, email) <span class="cm">-- SQL Server</span>`,
example:ex([
  {t:"emails",html:tbl(['email'],[['alice@corp.com'],['bo@org.net']])},
  {t:"position of @",html:tbl(['email','pos'],[['alice@corp.com','6'],['bo@org.net','3']],[0,1])}
])},

{cat:"STRING",name:"REPLACE()",desc:"Replaces all occurrences of a substring with another string.",
syntax:`<span class="fn">REPLACE</span>(phone, <span class="str">'-'</span>, <span class="str">''</span>)`,
example:ex([
  {t:"contacts",html:tbl(['phone'],[['04-1234-5678'],['04-9876-5432']])},
  {t:"cleaned",html:tbl(['phone'],[['0412345678'],['0498765432']],[0,1])}
])},

{cat:"STRING",name:"LPAD() / RPAD()",desc:"Pads a string on the left or right to reach a specified total length.",
syntax:`<span class="fn">LPAD</span>(id, 6, <span class="str">'0'</span>)\n<span class="fn">RPAD</span>(name, 8, <span class="str">'.'</span>)`,
example:ex([
  {t:"input",html:tbl(['id','name'],[['42','Alice'],['7','Bob']])},
  {t:"padded",html:tbl(['padded_id','padded_name'],[['000042','Alice...'],['000007','Bob.....']],[0,1])}
])},

{cat:"STRING",name:"REGEXP_LIKE()",desc:"Returns true if a string matches a regular expression (Oracle / PostgreSQL).",
syntax:`<span class="kw">WHERE</span> <span class="fn">REGEXP_LIKE</span>(email, <span class="str">'^[a-z]+@'</span>)`,
example:ex([
  {t:"emails",html:tbl(['email'],[['alice@corp.com'],['123INVALID'],['bob@org.net']])},
  {t:"matches",html:tbl(['email'],[['alice@corp.com'],['bob@org.net']],[0,1])}
])},

{cat:"STRING",name:"REGEXP_REPLACE()",desc:"Replaces substrings matching a regex pattern.",
syntax:`<span class="fn">REGEXP_REPLACE</span>(col, <span class="str">'[0-9]'</span>, <span class="str">'#'</span>)`,
example:ex([
  {t:"input",html:tbl(['val'],[['Order 42A'],['Ref 007']])},
  {t:"masked",html:tbl(['result'],[['Order ##A'],['Ref ###']],[0,1])}
])},

{cat:"STRING",name:"INITCAP()",desc:"Capitalises the first letter of each word.",
syntax:`<span class="fn">INITCAP</span>(name)`,
example:ex([
  {t:"input",html:tbl(['name'],[['ALICE SMITH'],['bob JONES']])},
  {t:"INITCAP",html:tbl(['name'],[['Alice Smith'],['Bob Jones']],[0,1])}
])},

{cat:"STRING",name:"REVERSE()",desc:"Reverses all characters in a string.",
syntax:`<span class="fn">REVERSE</span>(str)`,
example:ex([
  {t:"input",html:tbl(['word'],[['hello'],['SQL']])},
  {t:"reversed",html:tbl(['result'],[['olleh'],['LQS']],[0,1])}
])},

{cat:"STRING",name:"SPLIT_PART()",desc:"Splits a string by a delimiter and returns the nth segment (PostgreSQL / Snowflake).",
syntax:`<span class="fn">SPLIT_PART</span>(path, <span class="str">'/'</span>, 2)`,
example:ex([
  {t:"paths",html:tbl(['path'],[['au/sydney/cbd'],['us/boston/downtown']])},
  {t:"segment 2",html:tbl(['city'],[['sydney'],['boston']],[0,1])}
])},

{cat:"STRING",name:"LIKE / ILIKE",desc:"Pattern matching using % (any chars) and _ (one char). ILIKE is case-insensitive (PostgreSQL).",
syntax:`<span class="kw">WHERE</span> name <span class="kw">LIKE</span> <span class="str">'A%'</span>\n<span class="kw">WHERE</span> name <span class="kw">ILIKE</span> <span class="str">'%alice%'</span>`,
example:ex([
  {t:"names",html:tbl(['name'],[['Alice'],['Bob'],['Anna'],['Charlie']])},
  {t:"LIKE 'A%'",html:tbl(['name'],[['Alice'],['Anna']],[0,1])}
])},

{cat:"DATE",name:"TO_CHAR()",desc:"Converts a date or number to a formatted string (Oracle / PostgreSQL).",
syntax:`<span class="fn">TO_CHAR</span>(hire_date, <span class="str">'YYYY-MM-DD'</span>)\n<span class="fn">TO_CHAR</span>(salary, <span class="str">'$999,999'</span>)`,
example:ex([
  {t:"employees",html:tbl(['name','hire_date'],[['Alice','2021-03-15'],['Bob','2019-11-02']])},
  {t:"TO_CHAR(hire_date,'Mon YYYY')",html:tbl(['name','formatted'],[['Alice','Mar 2021'],['Bob','Nov 2019']],[0,1])}
])},

{cat:"DATE",name:"TO_DATE()",desc:"Converts a string to a DATE using a format mask.",
syntax:`<span class="fn">TO_DATE</span>(<span class="str">'15/03/2024'</span>, <span class="str">'DD/MM/YYYY'</span>)`,
example:ex([
  {t:"raw strings",html:tbl(['date_str'],[['15/03/2024'],['01/12/2023']])},
  {t:"as DATE",html:tbl(['date_val'],[['2024-03-15'],['2023-12-01']],[0,1])}
])},

{cat:"DATE",name:"TO_TIMESTAMP()",desc:"Converts a string to a TIMESTAMP including the time portion.",
syntax:`<span class="fn">TO_TIMESTAMP</span>(<span class="str">'2024-03-15 14:30:00'</span>,\n  <span class="str">'YYYY-MM-DD HH24:MI:SS'</span>)`,
example:ex([
  {t:"string",html:tbl(['str'],[['2024-03-15 14:30:00']])},
  {t:"TIMESTAMP",html:tbl(['ts'],[['2024-03-15 14:30:00.000']],[0])}
])},

{cat:"DATE",name:"SYSDATE / NOW()",desc:"Returns the current date and time at query execution.",
syntax:`<span class="fn">SYSDATE</span>       <span class="cm">-- Oracle\n</span><span class="fn">NOW</span>()         <span class="cm">-- MySQL / PostgreSQL\n</span><span class="fn">GETDATE</span>()     <span class="cm">-- SQL Server</span>`,
example:ex([
  {t:"result",html:tbl(['current_datetime'],[['2024-05-21 09:42:15']],[0])}
])},

{cat:"DATE",name:"TRUNC() / DATE_TRUNC()",desc:"Truncates a date to the start of the specified unit (removes time or sub-units).",
syntax:`<span class="fn">TRUNC</span>(sysdate, <span class="str">'MM'</span>)\n<span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, now())`,
example:ex([
  {t:"dates",html:tbl(['dt'],[['2024-05-21 14:30:00'],['2024-05-03 09:00:00']])},
  {t:"TRUNC to month",html:tbl(['truncated'],[['2024-05-01'],['2024-05-01']],[0,1])}
])},

{cat:"DATE",name:"EXTRACT() / DATEPART()",desc:"Extracts a specific component (year, month, day…) from a date.",
syntax:`<span class="fn">EXTRACT</span>(<span class="kw">YEAR FROM</span> hire_date)\n<span class="fn">DATEPART</span>(month, hire_date)  <span class="cm">-- SQL Server</span>`,
example:ex([
  {t:"hire_dates",html:tbl(['name','hire_date'],[['Alice','2021-03-15'],['Bob','2019-11-02']])},
  {t:"EXTRACT(YEAR)",html:tbl(['name','year'],[['Alice','2021'],['Bob','2019']],[0,1])}
])},

{cat:"DATE",name:"ADD_MONTHS()",desc:"Adds a specified number of months to a date (Oracle).",
syntax:`<span class="fn">ADD_MONTHS</span>(hire_date, 6)`,
example:ex([
  {t:"hire dates",html:tbl(['hire_date'],[['2024-01-15'],['2024-10-20']])},
  {t:"+ 6 months",html:tbl(['review_date'],[['2024-07-15'],['2025-04-20']],[0,1])}
])},

{cat:"DATE",name:"DATEDIFF()",desc:"Returns the difference between two dates in a specified unit.",
syntax:`<span class="fn">DATEDIFF</span>(day, start_date, end_date) <span class="cm">-- SQL Server\n</span>end_date - start_date              <span class="cm">-- Oracle / PostgreSQL</span>`,
example:ex([
  {t:"projects",html:tbl(['name','start','end'],[['Alpha','2024-01-01','2024-03-31'],['Beta','2024-02-15','2024-04-15']])},
  {t:"days difference",html:tbl(['name','days'],[['Alpha','90'],['Beta','60']],[0,1])}
])},

{cat:"DATE",name:"DATE_ADD() / DATEADD()",desc:"Adds an interval (days, months…) to a date.",
syntax:`<span class="fn">DATE_ADD</span>(dt, <span class="kw">INTERVAL</span> 14 <span class="kw">DAY</span>)  <span class="cm">-- MySQL\n</span><span class="fn">DATEADD</span>(day, 14, dt)           <span class="cm">-- SQL Server</span>`,
example:ex([
  {t:"order dates",html:tbl(['order_date'],[['2024-05-01'],['2024-05-10']])},
  {t:"due (+14 days)",html:tbl(['due_date'],[['2024-05-15'],['2024-05-24']],[0,1])}
])},

{cat:"DATE",name:"MONTHS_BETWEEN()",desc:"Returns the fractional number of months between two dates (Oracle).",
syntax:`<span class="fn">MONTHS_BETWEEN</span>(end_date, start_date)`,
example:ex([
  {t:"dates",html:tbl(['start','end'],[['2024-01-01','2024-04-01']])},
  {t:"months",html:tbl(['months'],[['3']],[0])}
])},

{cat:"DATE",name:"LAST_DAY()",desc:"Returns the last calendar day of the month for a given date.",
syntax:`<span class="fn">LAST_DAY</span>(SYSDATE)`,
example:ex([
  {t:"input",html:tbl(['dt'],[['2024-02-10'],['2024-05-01']])},
  {t:"LAST_DAY",html:tbl(['last_day'],[['2024-02-29'],['2024-05-31']],[0,1])}
])},

{cat:"DATE",name:"FORMAT() / TO_CHAR()",desc:"Formats a date as a string in a specified pattern.",
syntax:`<span class="fn">FORMAT</span>(dt, <span class="str">'dd MMM yyyy'</span>)  <span class="cm">-- SQL Server\n</span><span class="fn">TO_CHAR</span>(dt, <span class="str">'DD Mon YYYY'</span>) <span class="cm">-- Oracle</span>`,
example:ex([
  {t:"dates",html:tbl(['dt'],[['2024-05-21'],['2024-12-01']])},
  {t:"formatted",html:tbl(['result'],[['21 May 2024'],['01 Dec 2024']],[0,1])}
])},

{cat:"NUMERIC",name:"ROUND()",desc:"Rounds a number to a specified decimal place.",
syntax:`<span class="fn">ROUND</span>(3.14159, 2)\n<span class="fn">ROUND</span>(salary, -3)`,
example:ex([
  {t:"values",html:tbl(['val'],[['3.14159'],['67543.87']])},
  {t:"ROUND(val,2)",html:tbl(['rounded'],[['3.14'],['67543.87']],[0,1])}
])},

{cat:"NUMERIC",name:"TRUNC() / FLOOR()",desc:"Truncates a number down without rounding.",
syntax:`<span class="fn">TRUNC</span>(3.99)  <span class="cm">-- Oracle → 3\n</span><span class="fn">FLOOR</span>(3.99)  <span class="cm">-- all → 3</span>`,
example:ex([
  {t:"values",html:tbl(['val'],[['3.99'],['7.01'],['-2.3']])},
  {t:"FLOOR",html:tbl(['floored'],[['3'],['7'],['-3']],[0,1,2])}
])},

{cat:"NUMERIC",name:"CEIL() / CEILING()",desc:"Rounds a number up to the nearest integer.",
syntax:`<span class="fn">CEIL</span>(3.01)     <span class="cm">-- → 4\n</span><span class="fn">CEILING</span>(3.01)  <span class="cm">-- SQL Server</span>`,
example:ex([
  {t:"values",html:tbl(['val'],[['3.01'],['7.99'],['5.0']])},
  {t:"CEIL",html:tbl(['ceiling'],[['4'],['8'],['5']],[0,1,2])}
])},

{cat:"NUMERIC",name:"ABS()",desc:"Returns the absolute (always positive) value of a number.",
syntax:`<span class="fn">ABS</span>(amount)`,
example:ex([
  {t:"amounts",html:tbl(['amount'],[['150'],['-75'],['0'],['-320']])},
  {t:"ABS(amount)",html:tbl(['abs'],[['150'],['75'],['0'],['320']],[0,1,2,3])}
])},

{cat:"NUMERIC",name:"MOD()",desc:"Returns the remainder after dividing one number by another.",
syntax:`<span class="fn">MOD</span>(10, 3)  <span class="cm">-- → 1</span>`,
example:ex([
  {t:"values",html:tbl(['n','divisor'],[['10','3'],['15','4'],['20','5']])},
  {t:"MOD result",html:tbl(['remainder'],[['1'],['3'],['0']],[0,1,2])}
])},

{cat:"NUMERIC",name:"POWER()",desc:"Raises a number to the power of an exponent.",
syntax:`<span class="fn">POWER</span>(base, exp)`,
example:ex([
  {t:"input",html:tbl(['base','exp'],[['2','8'],['3','3'],['10','3']])},
  {t:"result",html:tbl(['power'],[['256'],['27'],['1000']],[0,1,2])}
])},

{cat:"NUMERIC",name:"SQRT()",desc:"Returns the square root of a non-negative number.",
syntax:`<span class="fn">SQRT</span>(val)`,
example:ex([
  {t:"values",html:tbl(['val'],[['144'],['25'],['2']])},
  {t:"SQRT",html:tbl(['result'],[['12'],['5'],['1.414']],[0,1,2])}
])},

{cat:"NUMERIC",name:"SIGN()",desc:"Returns -1, 0, or 1 based on the sign of the value.",
syntax:`<span class="fn">SIGN</span>(amount)`,
example:ex([
  {t:"amounts",html:tbl(['amount'],[['150'],['-75'],['0']])},
  {t:"SIGN",html:tbl(['sign'],[['1'],['-1'],['0']],[0,1,2])}
])},

{cat:"CONVERSION",name:"CAST()",desc:"Explicitly converts a value to a different data type.",
syntax:`<span class="kw">CAST</span>(col <span class="kw">AS VARCHAR</span>(50))\n<span class="kw">CAST</span>(price <span class="kw">AS DECIMAL</span>(10,2))`,
example:ex([
  {t:"input (strings)",html:tbl(['id_str','price_str'],[["'42'","'19.99'"]])},
  {t:"after CAST",html:tbl(['id (INT)','price (DECIMAL)'],[['42','19.99']],[0])}
])},

{cat:"CONVERSION",name:"CONVERT()",desc:"Converts a value to a specified data type (SQL Server / MySQL).",
syntax:`<span class="fn">CONVERT</span>(<span class="kw">VARCHAR</span>, hire_date, 103) <span class="cm">-- SQL Server</span>`,
example:ex([
  {t:"date column",html:tbl(['hire_date'],[['2024-05-21'],['2024-01-15']])},
  {t:"CONVERT result",html:tbl(['formatted'],[['21/05/2024'],['15/01/2024']],[0,1])}
])},

{cat:"CONVERSION",name:"TO_NUMBER()",desc:"Converts a formatted string to a numeric value (Oracle).",
syntax:`<span class="fn">TO_NUMBER</span>(<span class="str">'$1,234.56'</span>, <span class="str">'$9,999.99'</span>)`,
example:ex([
  {t:"strings",html:tbl(['str'],[["'1,234.56'"],["'9,000.00'"]])},
  {t:"as NUMBER",html:tbl(['num'],[['1234.56'],['9000.00']],[0,1])}
])},

{cat:"CONVERSION",name:"TRY_CAST() / TRY_CONVERT()",desc:"Attempts conversion; returns NULL on failure instead of throwing an error (SQL Server).",
syntax:`<span class="fn">TRY_CAST</span>(col <span class="kw">AS INT</span>)`,
example:ex([
  {t:"mixed data",html:tbl(['val'],[['42'],['hello'],['99']])},
  {t:"TRY_CAST as INT",html:tbl(['result'],[['42'],['NULL'],['99']],[1])}
])},

{cat:"CONVERSION",name:"Implicit CAST ::",desc:"PostgreSQL shorthand cast operator using double-colon syntax.",
syntax:`col::<span class="kw">INT</span>\ncol::<span class="kw">DATE</span>\ncol::<span class="kw">NUMERIC</span>`,
example:ex([
  {t:"input",html:tbl(['str'],[["'2024-05-21'"],["'42'"]])},
  {t:"::DATE / ::INT",html:tbl(['as_date','as_int'],[['2024-05-21','42']],[0])}
])},

{cat:"WINDOW",name:"ROW_NUMBER()",desc:"Assigns a unique sequential integer to each row within a partition.",
syntax:`<span class="fn">ROW_NUMBER</span>() <span class="kw">OVER</span>\n  (<span class="kw">PARTITION BY</span> dept <span class="kw">ORDER BY</span> salary <span class="kw">DESC</span>)`,
example:ex([
  {t:"employees",html:tbl(['name','dept','salary'],[['Alice','Eng','110000'],['Carol','Eng','95000'],['Bob','Mkt','80000'],['Dan','Mkt','72000']])},
  {t:"ROW_NUMBER per dept",html:tbl(['name','dept','salary','rn'],[['Alice','Eng','110000','1'],['Carol','Eng','95000','2'],['Bob','Mkt','80000','1'],['Dan','Mkt','72000','2']],[0,1,2,3])}
])},

{cat:"WINDOW",name:"RANK()",desc:"Assigns rank with gaps when there are tied values.",
syntax:`<span class="fn">RANK</span>() <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> salary <span class="kw">DESC</span>)`,
example:ex([
  {t:"salaries",html:tbl(['name','salary'],[['Alice','95000'],['Bob','95000'],['Carol','80000']])},
  {t:"RANK()",html:tbl(['name','salary','rank'],[['Alice','95000','1'],['Bob','95000','1'],['Carol','80000','3']],[0,1,2])}
])},

{cat:"WINDOW",name:"DENSE_RANK()",desc:"Assigns rank without gaps when there are tied values.",
syntax:`<span class="fn">DENSE_RANK</span>() <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> salary <span class="kw">DESC</span>)`,
example:ex([
  {t:"salaries",html:tbl(['name','salary'],[['Alice','95000'],['Bob','95000'],['Carol','80000']])},
  {t:"DENSE_RANK()",html:tbl(['name','salary','dense_rank'],[['Alice','95000','1'],['Bob','95000','1'],['Carol','80000','2']],[0,1,2])}
])},

{cat:"WINDOW",name:"NTILE()",desc:"Divides rows into N approximately equal buckets.",
syntax:`<span class="fn">NTILE</span>(4) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> salary)`,
example:ex([
  {t:"8 employees",html:tbl(['name','salary'],[['A','50k'],['B','60k'],['C','70k'],['D','80k'],['E','90k'],['F','100k'],['G','110k'],['H','120k']])},
  {t:"NTILE(4) = quartiles",html:tbl(['name','quartile'],[['A','1'],['B','1'],['C','2'],['D','2'],['E','3'],['F','3'],['G','4'],['H','4']],[0,1,2,3,4,5,6,7])}
])},

{cat:"WINDOW",name:"LAG()",desc:"Accesses a value from a previous row within the partition.",
syntax:`<span class="fn">LAG</span>(sales, 1, 0) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> month)`,
example:ex([
  {t:"monthly_sales",html:tbl(['month','sales'],[['Jan','100'],['Feb','120'],['Mar','90'],['Apr','150']])},
  {t:"with LAG",html:tbl(['month','sales','prev_month'],[['Jan','100','0'],['Feb','120','100'],['Mar','90','120'],['Apr','150','90']],[0,1,2,3])}
])},

{cat:"WINDOW",name:"LEAD()",desc:"Accesses a value from a subsequent row within the partition.",
syntax:`<span class="fn">LEAD</span>(sales, 1, 0) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> month)`,
example:ex([
  {t:"monthly_sales",html:tbl(['month','sales'],[['Jan','100'],['Feb','120'],['Mar','90']])},
  {t:"with LEAD",html:tbl(['month','sales','next_month'],[['Jan','100','120'],['Feb','120','90'],['Mar','90','0']],[0,1,2])}
])},

{cat:"WINDOW",name:"FIRST_VALUE()",desc:"Returns the first value in an ordered window frame.",
syntax:`<span class="fn">FIRST_VALUE</span>(salary) <span class="kw">OVER</span>\n  (<span class="kw">PARTITION BY</span> dept <span class="kw">ORDER BY</span> salary <span class="kw">DESC</span>)`,
example:ex([
  {t:"employees",html:tbl(['name','dept','salary'],[['Alice','Eng','110000'],['Carol','Eng','95000'],['Bob','Mkt','80000'],['Dan','Mkt','72000']])},
  {t:"FIRST_VALUE (dept leader)",html:tbl(['name','dept','top_sal'],[['Alice','Eng','110000'],['Carol','Eng','110000'],['Bob','Mkt','80000'],['Dan','Mkt','80000']],[0,1,2,3])}
])},

{cat:"WINDOW",name:"LAST_VALUE()",desc:"Returns the last value in an ordered window frame.",
syntax:`<span class="fn">LAST_VALUE</span>(salary) <span class="kw">OVER</span> (\n  <span class="kw">ORDER BY</span> salary\n  <span class="kw">ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING</span>\n)`,
example:ex([
  {t:"salaries",html:tbl(['name','salary'],[['Alice','95000'],['Bob','80000'],['Carol','110000']])},
  {t:"LAST_VALUE (max in frame)",html:tbl(['name','last_val'],[['Alice','110000'],['Bob','110000'],['Carol','110000']],[0,1,2])}
])},

{cat:"WINDOW",name:"SUM() OVER()",desc:"Running or partitioned sum as a window function.",
syntax:`<span class="fn">SUM</span>(sales) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> month\n  <span class="kw">ROWS UNBOUNDED PRECEDING</span>)`,
example:ex([
  {t:"monthly_sales",html:tbl(['month','sales'],[['Jan','100'],['Feb','120'],['Mar','90'],['Apr','150']])},
  {t:"running total",html:tbl(['month','sales','running_sum'],[['Jan','100','100'],['Feb','120','220'],['Mar','90','310'],['Apr','150','460']],[0,1,2,3])}
])},

{cat:"WINDOW",name:"PARTITION BY",desc:"Divides result rows into groups for window function calculations.",
syntax:`<span class="fn">AVG</span>(salary) <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> dept)`,
example:ex([
  {t:"employees",html:tbl(['name','dept','salary'],[['Alice','Eng','110000'],['Carol','Eng','90000'],['Bob','Mkt','80000'],['Dan','Mkt','70000']])},
  {t:"with dept avg",html:tbl(['name','dept','salary','dept_avg'],[['Alice','Eng','110000','100000'],['Carol','Eng','90000','100000'],['Bob','Mkt','80000','75000'],['Dan','Mkt','70000','75000']],[0,1,2,3])}
])},

{cat:"WINDOW",name:"ROWS / RANGE BETWEEN",desc:"Defines the frame boundary for window function calculations.",
syntax:`<span class="kw">ROWS BETWEEN</span> 2 <span class="kw">PRECEDING AND CURRENT ROW</span>`,
example:ex([
  {t:"daily sales",html:tbl(['day','sales'],[['1','10'],['2','20'],['3','15'],['4','30']])},
  {t:"3-day rolling avg",html:tbl(['day','rolling_avg'],[['1','10.0'],['2','15.0'],['3','15.0'],['4','21.7']],[0,1,2,3])}
])},

{cat:"CONDITIONAL",name:"CASE WHEN",desc:"Evaluates conditions in order and returns the value for the first match.",
syntax:`<span class="kw">CASE</span>\n  <span class="kw">WHEN</span> salary > 100000 <span class="kw">THEN</span> <span class="str">'High'</span>\n  <span class="kw">WHEN</span> salary > 60000  <span class="kw">THEN</span> <span class="str">'Mid'</span>\n  <span class="kw">ELSE</span> <span class="str">'Low'</span>\n<span class="kw">END</span>`,
example:ex([
  {t:"employees",html:tbl(['name','salary'],[['Alice','110000'],['Bob','75000'],['Carol','45000']])},
  {t:"salary_band",html:tbl(['name','band'],[['Alice','High'],['Bob','Mid'],['Carol','Low']],[0,1,2])}
])},

{cat:"CONDITIONAL",name:"IIF() / IF()",desc:"Inline two-branch conditional expression.",
syntax:`<span class="fn">IIF</span>(salary>80000,<span class="str">'Senior'</span>,<span class="str">'Junior'</span>)  <span class="cm">-- SQL Server\n</span><span class="fn">IF</span>(salary>80000,<span class="str">'Senior'</span>,<span class="str">'Junior'</span>)   <span class="cm">-- MySQL</span>`,
example:ex([
  {t:"employees",html:tbl(['name','salary'],[['Alice','110000'],['Bob','75000'],['Carol','90000']])},
  {t:"level",html:tbl(['name','level'],[['Alice','Senior'],['Bob','Junior'],['Carol','Senior']],[0,1,2])}
])},

{cat:"CONDITIONAL",name:"DECODE()",desc:"Oracle shorthand for CASE equality checks — maps input values to outputs.",
syntax:`<span class="fn">DECODE</span>(status, <span class="str">'A'</span>, <span class="str">'Active'</span>, <span class="str">'I'</span>, <span class="str">'Inactive'</span>, <span class="str">'Unknown'</span>)`,
example:ex([
  {t:"users",html:tbl(['name','status'],[['Alice','A'],['Bob','I'],['Carol','X']])},
  {t:"decoded",html:tbl(['name','label'],[['Alice','Active'],['Bob','Inactive'],['Carol','Unknown']],[0,1,2])}
])},

{cat:"CONDITIONAL",name:"GREATEST() / LEAST()",desc:"Returns the largest or smallest value from a list of expressions.",
syntax:`<span class="fn">GREATEST</span>(q1, q2, q3, q4)\n<span class="fn">LEAST</span>(q1, q2, q3, q4)`,
example:ex([
  {t:"quarterly sales",html:tbl(['product','Q1','Q2','Q3','Q4'],[['A','100','150','90','200'],['B','80','70','110','95']])},
  {t:"best / worst",html:tbl(['product','best','worst'],[['A','200','90'],['B','110','70']],[0,1])}
])},

{cat:"CONDITIONAL",name:"IN / NOT IN",desc:"Tests whether a value matches any value in a list or subquery.",
syntax:`<span class="kw">WHERE</span> status <span class="kw">IN</span> (<span class="str">'Active'</span>, <span class="str">'Pending'</span>)`,
example:ex([
  {t:"orders",html:tbl(['id','status'],[['1','Active'],['2','Closed'],['3','Pending'],['4','Cancelled']])},
  {t:"IN ('Active','Pending')",html:tbl(['id','status'],[['1','Active'],['3','Pending']],[0,1])}
])},

{cat:"CONDITIONAL",name:"BETWEEN",desc:"Tests whether a value falls within an inclusive range.",
syntax:`<span class="kw">WHERE</span> salary <span class="kw">BETWEEN</span> 70000 <span class="kw">AND</span> 100000`,
example:ex([
  {t:"employees",html:tbl(['name','salary'],[['Alice','110000'],['Bob','75000'],['Carol','95000'],['Dan','65000']])},
  {t:"BETWEEN 70k-100k",html:tbl(['name','salary'],[['Bob','75000'],['Carol','95000']],[0,1])}
])},

{cat:"CONDITIONAL",name:"EXISTS / NOT EXISTS",desc:"Tests whether a subquery returns any rows.",
syntax:`<span class="kw">WHERE EXISTS</span> (\n  <span class="kw">SELECT</span> 1 <span class="kw">FROM</span> orders o\n  <span class="kw">WHERE</span> o.customer_id = c.id\n)`,
example:ex([
  {t:"customers",html:tbl(['id','name'],[['1','Alice'],['2','Bob'],['3','Carol']])},
  {t:"orders",html:tbl(['id','customer_id'],[['101','1'],['102','1']])},
  {t:"customers WITH orders",html:tbl(['name'],[['Alice']],[0])}
])},

{cat:"SUBQUERY",name:"WITH (CTE)",desc:"Common Table Expression — a named temporary result set.",
syntax:`<span class="kw">WITH</span> dept_avg <span class="kw">AS</span> (\n  <span class="kw">SELECT</span> dept, <span class="fn">AVG</span>(salary) avg_sal\n  <span class="kw">FROM</span> employees <span class="kw">GROUP BY</span> dept\n)\n<span class="kw">SELECT</span> * <span class="kw">FROM</span> dept_avg <span class="kw">WHERE</span> avg_sal>80000;`,
example:ex([
  {t:"employees",html:tbl(['name','dept','salary'],[['Alice','Eng','110000'],['Carol','Eng','90000'],['Bob','Mkt','70000'],['Dan','Mkt','65000']])},
  {t:"CTE: dept_avg",html:tbl(['dept','avg_sal'],[['Eng','100000'],['Mkt','67500']])},
  {t:"final result",html:tbl(['dept','avg_sal'],[['Eng','100000']],[0])}
])},

{cat:"SUBQUERY",name:"Recursive CTE",desc:"A CTE that references itself to traverse hierarchical data.",
syntax:`<span class="kw">WITH RECURSIVE</span> tree <span class="kw">AS</span> (\n  <span class="kw">SELECT</span> id, name, manager_id, 1 lvl\n  <span class="kw">FROM</span> org <span class="kw">WHERE</span> manager_id <span class="kw">IS NULL</span>\n  <span class="kw">UNION ALL</span>\n  <span class="kw">SELECT</span> o.id, o.name, o.manager_id, t.lvl+1\n  <span class="kw">FROM</span> org o <span class="kw">JOIN</span> tree t <span class="kw">ON</span> o.manager_id=t.id\n)`,
example:ex([
  {t:"org",html:tbl(['id','name','manager_id'],[['1','CEO','NULL'],['2','VP Eng','1'],['3','Engineer','2']])},
  {t:"recursive result",html:tbl(['id','name','level'],[['1','CEO','1'],['2','VP Eng','2'],['3','Engineer','3']],[0,1,2])}
])},

{cat:"SUBQUERY",name:"Scalar Subquery",desc:"A subquery returning a single value, used inline in SELECT or WHERE.",
syntax:`<span class="kw">SELECT</span> name, salary,\n  (<span class="kw">SELECT MAX</span>(salary) <span class="kw">FROM</span> employees) max_sal\n<span class="kw">FROM</span> employees;`,
example:ex([
  {t:"employees",html:tbl(['name','salary'],[['Alice','95000'],['Bob','72000'],['Carol','110000']])},
  {t:"result",html:tbl(['name','salary','max_sal'],[['Alice','95000','110000'],['Bob','72000','110000'],['Carol','110000','110000']],[0,1,2])}
])},

{cat:"SUBQUERY",name:"Correlated Subquery",desc:"A subquery referencing a column from the outer query — runs per row.",
syntax:`<span class="kw">SELECT</span> name <span class="kw">FROM</span> employees e\n<span class="kw">WHERE</span> salary > (\n  <span class="kw">SELECT AVG</span>(salary) <span class="kw">FROM</span> employees\n  <span class="kw">WHERE</span> dept=e.dept\n);`,
example:ex([
  {t:"employees",html:tbl(['name','dept','salary'],[['Alice','Eng','110000'],['Carol','Eng','90000'],['Bob','Mkt','80000'],['Dan','Mkt','70000']])},
  {t:"above dept average",html:tbl(['name','salary'],[['Alice','110000'],['Bob','80000']],[0,1])}
])},

{cat:"SUBQUERY",name:"Derived Table",desc:"An inline subquery in the FROM clause, treated as a virtual table.",
syntax:`<span class="kw">SELECT</span> * <span class="kw">FROM</span> (\n  <span class="kw">SELECT</span> dept, <span class="fn">AVG</span>(salary) avg_sal\n  <span class="kw">FROM</span> employees <span class="kw">GROUP BY</span> dept\n) d\n<span class="kw">WHERE</span> d.avg_sal>80000;`,
example:ex([
  {t:"employees",html:tbl(['dept','salary'],[['Eng','110000'],['Eng','90000'],['Mkt','70000'],['Mkt','65000']])},
  {t:"derived table",html:tbl(['dept','avg_sal'],[['Eng','100000'],['Mkt','67500']])},
  {t:"filtered",html:tbl(['dept','avg_sal'],[['Eng','100000']],[0])}
])},

{cat:"NULL",name:"IS NULL / IS NOT NULL",desc:"Tests whether a value is NULL (unknown/missing).",
syntax:`<span class="kw">WHERE</span> manager_id <span class="kw">IS NULL</span>\n<span class="kw">WHERE</span> email <span class="kw">IS NOT NULL</span>`,
example:ex([
  {t:"employees",html:tbl(['name','manager_id'],[['Alice','NULL'],['Bob','1'],['Carol','NULL']])},
  {t:"IS NULL (top-level staff)",html:tbl(['name'],[['Alice'],['Carol']],[0,1])}
])},

{cat:"NULL",name:"NVL()",desc:"Replaces NULL with a specified fallback value (Oracle).",
syntax:`<span class="fn">NVL</span>(commission, 0)`,
example:ex([
  {t:"employees",html:tbl(['name','commission'],[['Alice','5000'],['Bob','NULL'],['Carol','3000'],['Dan','NULL']])},
  {t:"NVL(commission,0)",html:tbl(['name','commission'],[['Alice','5000'],['Bob','0'],['Carol','3000'],['Dan','0']],[1,3])}
])},

{cat:"NULL",name:"NVL2()",desc:"Returns different values depending on whether an expression is NULL (Oracle).",
syntax:`<span class="fn">NVL2</span>(commission, salary+commission, salary)`,
example:ex([
  {t:"employees",html:tbl(['name','salary','commission'],[['Alice','90000','5000'],['Bob','80000','NULL']])},
  {t:"total_pay",html:tbl(['name','total_pay'],[['Alice','95000'],['Bob','80000']],[0,1])}
])},

{cat:"NULL",name:"COALESCE()",desc:"Returns the first non-NULL value from a list. Standard SQL.",
syntax:`<span class="fn">COALESCE</span>(mobile, home, work, <span class="str">'No phone'</span>)`,
example:ex([
  {t:"contacts",html:tbl(['name','mobile','home','work'],[['Alice','NULL','NULL','0298765432'],['Bob','0412345678','NULL','NULL'],['Carol','NULL','NULL','NULL']])},
  {t:"best_phone",html:tbl(['name','best_phone'],[['Alice','0298765432'],['Bob','0412345678'],['Carol','No phone']],[0,1,2])}
])},

{cat:"NULL",name:"NULLIF()",desc:"Returns NULL if two expressions are equal; otherwise returns the first.",
syntax:`<span class="fn">NULLIF</span>(col, 0)  <span class="cm">-- avoids divide-by-zero</span>`,
example:ex([
  {t:"values",html:tbl(['a','b'],[['10','0'],['10','5'],['0','0']])},
  {t:"100 / NULLIF(b,0)",html:tbl(['result'],[['NULL'],['20'],['NULL']],[0,2])}
])},

{cat:"NULL",name:"ISNULL() / IFNULL()",desc:"Returns a replacement when the expression is NULL (SQL Server / MySQL).",
syntax:`<span class="fn">ISNULL</span>(col, 0)   <span class="cm">-- SQL Server\n</span><span class="fn">IFNULL</span>(col, 0)   <span class="cm">-- MySQL</span>`,
example:ex([
  {t:"scores",html:tbl(['name','score'],[['Alice','95'],['Bob','NULL'],['Carol','88']])},
  {t:"ISNULL(score,0)",html:tbl(['name','score'],[['Alice','95'],['Bob','0'],['Carol','88']],[1])}
])},

{cat:"SET",name:"UNION",desc:"Combines results of two queries, removing duplicate rows.",
syntax:`<span class="kw">SELECT</span> name <span class="kw">FROM</span> table_a\n<span class="kw">UNION</span>\n<span class="kw">SELECT</span> name <span class="kw">FROM</span> table_b;`,
example:ex([
  {t:"table_a",html:tbl(['name'],[['Alice'],['Bob'],['Carol']])},
  {t:"table_b",html:tbl(['name'],[['Bob'],['Dan'],['Eve']])},
  {t:"UNION (deduped)",html:tbl(['name'],[['Alice'],['Bob'],['Carol'],['Dan'],['Eve']],[0,1,2,3,4])}
])},

{cat:"SET",name:"UNION ALL",desc:"Combines results of two queries keeping all rows including duplicates.",
syntax:`<span class="kw">SELECT</span> name <span class="kw">FROM</span> table_a\n<span class="kw">UNION ALL</span>\n<span class="kw">SELECT</span> name <span class="kw">FROM</span> table_b;`,
example:ex([
  {t:"table_a",html:tbl(['name'],[['Alice'],['Bob']])},
  {t:"table_b",html:tbl(['name'],[['Bob'],['Carol']])},
  {t:"UNION ALL (4 rows)",html:tbl(['name'],[['Alice'],['Bob'],['Bob'],['Carol']],[0,1,2,3])}
])},

{cat:"SET",name:"INTERSECT",desc:"Returns only rows that appear in both queries.",
syntax:`<span class="kw">SELECT</span> id <span class="kw">FROM</span> table_a\n<span class="kw">INTERSECT</span>\n<span class="kw">SELECT</span> id <span class="kw">FROM</span> table_b;`,
example:ex([
  {t:"table_a ids",html:tbl(['id'],[['1'],['2'],['3'],['4']])},
  {t:"table_b ids",html:tbl(['id'],[['2'],['4'],['6']])},
  {t:"INTERSECT",html:tbl(['id'],[['2'],['4']],[0,1])}
])},

{cat:"SET",name:"EXCEPT / MINUS",desc:"Returns rows in the first query not present in the second.",
syntax:`<span class="kw">SELECT</span> id <span class="kw">FROM</span> all_customers\n<span class="kw">EXCEPT</span>\n<span class="kw">SELECT</span> id <span class="kw">FROM</span> active_customers;`,
example:ex([
  {t:"all customers",html:tbl(['id'],[['1'],['2'],['3'],['4'],['5']])},
  {t:"active",html:tbl(['id'],[['1'],['3'],['5']])},
  {t:"inactive (EXCEPT)",html:tbl(['id'],[['2'],['4']],[0,1])}
])},

{cat:"ANALYTIC",name:"PERCENT_RANK()",desc:"Returns the relative rank of a row as a value between 0 and 1.",
syntax:`<span class="fn">PERCENT_RANK</span>() <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> salary)`,
example:ex([
  {t:"salaries",html:tbl(['name','salary'],[['Dan','70000'],['Bob','80000'],['Alice','95000'],['Carol','110000']])},
  {t:"PERCENT_RANK",html:tbl(['name','pct_rank'],[['Dan','0.00'],['Bob','0.33'],['Alice','0.67'],['Carol','1.00']],[0,1,2,3])}
])},

{cat:"ANALYTIC",name:"CUME_DIST()",desc:"Returns the cumulative distribution — fraction of rows at or below the current value.",
syntax:`<span class="fn">CUME_DIST</span>() <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> salary)`,
example:ex([
  {t:"salaries",html:tbl(['name','salary'],[['Dan','70000'],['Bob','80000'],['Alice','95000'],['Carol','110000']])},
  {t:"CUME_DIST",html:tbl(['name','cume_dist'],[['Dan','0.25'],['Bob','0.50'],['Alice','0.75'],['Carol','1.00']],[0,1,2,3])}
])},

{cat:"ANALYTIC",name:"PERCENTILE_CONT()",desc:"Calculates an interpolated (continuous) percentile value within a group.",
syntax:`<span class="fn">PERCENTILE_CONT</span>(0.5) <span class="kw">WITHIN GROUP</span>\n  (<span class="kw">ORDER BY</span> salary) <span class="kw">AS</span> median`,
example:ex([
  {t:"salaries",html:tbl(['salary'],[['70000'],['80000'],['95000'],['110000']])},
  {t:"PERCENTILE_CONT(0.5)",html:tbl(['median'],[['87500']],[0])}
])},

{cat:"ANALYTIC",name:"PERCENTILE_DISC()",desc:"Returns an actual data value at the specified discrete percentile.",
syntax:`<span class="fn">PERCENTILE_DISC</span>(0.5) <span class="kw">WITHIN GROUP</span>\n  (<span class="kw">ORDER BY</span> salary)`,
example:ex([
  {t:"salaries",html:tbl(['salary'],[['70000'],['80000'],['95000'],['110000']])},
  {t:"PERCENTILE_DISC(0.5)",html:tbl(['median'],[['80000']],[0])}
])},

{cat:"ANALYTIC",name:"MEDIAN()",desc:"Returns the median value (Oracle / Snowflake).",
syntax:`<span class="fn">MEDIAN</span>(salary)`,
example:ex([
  {t:"salaries",html:tbl(['dept','salary'],[['Eng','70000'],['Eng','80000'],['Eng','110000'],['Mkt','65000'],['Mkt','75000']])},

// ── Build filters ────────────────────────────────────────────────────
const cats=[...new Set(DATA.map(d=>d.cat))];
const filtersEl=document.getElementById('filters');
cats.forEach(cat=>{
  const btn=document.createElement('button');
  btn.className='filter-btn'; btn.dataset.cat=cat; btn.textContent=cat;
  filtersEl.appendChild(btn);
});

// ── Render ───────────────────────────────────────────────────────────
function render(query='',activeCat='all'){
  const glossary=document.getElementById('glossary');
  glossary.innerHTML='';
  const noRes=document.getElementById('no-results');
  const q=query.toLowerCase();
  let total=0;
  const groups={};
  DATA.forEach(item=>{
    const ms=!q||item.name.toLowerCase().includes(q)||item.desc.toLowerCase().includes(q)||item.cat.toLowerCase().includes(q);
    const mc=activeCat==='all'||item.cat===activeCat;
    if(ms&&mc){if(!groups[item.cat])groups[item.cat]=[];groups[item.cat].push(item);total++;}
  });
  document.getElementById('visible-count').textContent=total;
  document.getElementById('total-count').textContent=DATA.length;
  if(total===0){noRes.classList.add('show');return;}
  noRes.classList.remove('show');
  Object.entries(groups).forEach(([cat,items])=>{
    const info=CATEGORIES[cat]||{label:cat,color:'#64748b'};
    const sec=document.createElement('div');
    sec.className='category-section';
    sec.innerHTML=`<div class="category-header"><span class="cat-dot" style="background:${info.color}"></span><h2>${info.label}</h2><span class="cat-count">${items.length}</span></div><div class="cards-grid" id="grid-${cat}"></div>`;
    glossary.appendChild(sec);
    const grid=sec.querySelector('.cards-grid');
    items.forEach(item=>{
      const card=document.createElement('div');
      card.className='card';
      const extra=document.createElement('div');
      extra.className='card-extra';
      extra.innerHTML=item.example;
      card.innerHTML=`
        <div class="card-top">
          <span class="card-name">${item.name}</span>
          <span class="badge" style="background:${info.color}18;color:${info.color};border:1px solid ${info.color}33">${item.cat}</span>
        </div>
        <div class="card-desc">${item.desc}</div>
        <div class="card-syntax">${item.syntax}</div>`;
      card.appendChild(extra);
      card.addEventListener('click',()=>{
        const open=card.classList.toggle('open');
        card.style.borderColor=open?info.color+'99':'';
      });
      grid.appendChild(card);
    });
  });
}

let activeCat='all';
document.getElementById('search').addEventListener('input',e=>render(e.target.value,activeCat));
document.getElementById('filters').addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn');
  if(!btn)return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeCat=btn.dataset.cat;
  render(document.getElementById('search').value,activeCat);
});
render();
</script>
